<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NervyFox — Sélecteur de filament</title>
  <meta name="description" content="Trouve le bon filament 3D pour ton projet en 5 étapes. Guide gratuit par NervyFox.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/styles.css">
  <style>
    /* === SÉLECTEUR UNIQUEMENT === */
    .wrap { padding: 56px 24px 40px; }

    /* Étapes */
    .step-head { text-align: center; margin-bottom: 36px; }
    .step-eyebrow { font: 700 12px/1 'Space Mono', monospace; letter-spacing: .18em; text-transform: uppercase; margin-bottom: 14px; }
    .step-title { font-family: 'Bagel Fat One', cursive; font-size: 40px; line-height: 1.08; margin-bottom: 14px; }
    .step-subtitle { font-size: 16px; color: var(--text-muted); max-width: 520px; margin: 0 auto; }

    /* Barre de progression */
    .progress { display: flex; max-width: 480px; margin: 0 auto 44px; height: 14px; border: var(--border); border-radius: var(--radius-pill); overflow: hidden; background: var(--bg); }
    .progress div { flex: 1; border-right: 2px solid var(--ink); }
    .progress div:last-child { border-right: none; }

    /* Animations navigation */
    @keyframes zoomIn  { from { opacity:0; transform:scale(.94); } to { opacity:1; transform:scale(1); } }
    @keyframes zoomOut { from { opacity:1; transform:scale(1);   } to { opacity:0; transform:scale(.94); } }
    .step-zoom-in  { animation: zoomIn  .22s ease forwards; }
    .step-zoom-out { animation: zoomOut .18s ease forwards; }

    /* Grilles */
    .grid { display: grid; gap: 16px; }
    .grid.cols-5 { grid-template-columns: repeat(5, 1fr); }
    .grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
    .grid.cols-2 { grid-template-columns: repeat(2, 1fr); max-width: 600px; margin: 0 auto; }

    /* Cards */
    .card { position: relative; border: var(--border); border-radius: var(--radius-md); background: #fff; padding: 24px 14px; display: flex; flex-direction: column; align-items: center; gap: 10px; text-align: center; cursor: pointer; transition: transform .12s ease; }
    .card:hover { transform: translateY(-2px); }
    .card.selected { background: var(--selected-bg); box-shadow: var(--shadow-md); }
    .card.disabled { opacity: .4; cursor: not-allowed; }
    .card.disabled:hover { transform: none; }
    .card .icon { font-size: 26px; line-height: 1; }
    .card .label { font-weight: 700; font-size: 14px; line-height: 1.3; }
    .card .hint { font-size: 12px; color: var(--text-subtle); line-height: 1.4; margin-top: 2px; }
    .card .badge { position: absolute; top: -10px; right: -10px; width: 26px; height: 26px; border-radius: 50%; background: var(--orange); border: var(--border); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; color: var(--ink); }
    .card.large { padding: 28px 18px; border-radius: var(--radius-lg); }
    .card.large .label { font-size: 16px; }

    .constraint-helper { text-align: center; margin-bottom: 18px; font: 700 12px/1 'Space Mono', monospace; letter-spacing: .1em; text-transform: uppercase; color: var(--text-muted); }

    /* Bouton "aucune contrainte" — step 3 */
    .btn-none-wrap { max-width: 600px; margin: 20px auto 0; }
    .btn-none {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 16px 24px;
      border: var(--border); border-radius: var(--radius-pill);
      background: #fff; cursor: pointer; font-family: inherit;
      font-weight: 700; font-size: 15px; color: var(--text-muted);
      transition: background .12s, color .12s, box-shadow .12s, transform .12s;
    }
    .btn-none:hover { background: var(--bg); color: var(--ink); transform: translateY(-1px); box-shadow: var(--shadow-sm); }
    .btn-none.active { background: var(--ink); color: var(--bg); box-shadow: var(--shadow-sm); }
    .btn-none .btn-none-icon { font-size: 18px; }

    /* Navigation */
    .step-nav { display: flex; justify-content: space-between; align-items: center; gap: 16px; margin-top: 48px; }
    .btn-back { display: inline-flex; align-items: center; gap: 8px; border: var(--border); border-radius: var(--radius-pill); padding: 14px 26px; font-weight: 700; font-size: 15px; cursor: pointer; background: #fff; font-family: inherit; }
    .btn-back:hover { background: var(--bg); }
    .btn-back.hidden { visibility: hidden; }
    .btn-next { display: inline-flex; align-items: center; gap: 9px; border: var(--border); border-radius: var(--radius-pill); padding: 15px 32px; font-weight: 700; font-size: 16px; cursor: pointer; font-family: inherit; background: #EFE6D6; color: var(--text-faint); }
    .btn-next.ok { background: var(--orange); color: var(--ink); box-shadow: var(--shadow-sm); }

    /* Résultat */
    .result-hero { background: var(--ink); color: var(--bg); border-radius: 24px; padding: 48px 40px; text-align: center; margin-bottom: 32px; }
    .result-eyebrow { font: 700 11px/1 'Space Mono', monospace; letter-spacing: .2em; text-transform: uppercase; color: var(--text-light); margin-bottom: 20px; }
    .result-name { font-family: 'Bagel Fat One', cursive; font-size: 72px; line-height: 1; margin-bottom: 8px; }
    .result-tagline { font-family: 'Bagel Fat One', cursive; font-size: 24px; opacity: .7; margin-bottom: 28px; }
    .result-desc { font-size: 16px; line-height: 1.65; max-width: 560px; margin: 0 auto; color: var(--text-faint); }

    .recap { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 32px; }
    .recap-tag { background: #fff; border: 2px solid var(--ink); border-radius: var(--radius-pill); padding: 6px 14px; font: 700 11px/1 'Space Mono', monospace; letter-spacing: .06em; text-transform: uppercase; }

    .strength-box { border: var(--border); border-radius: var(--radius-lg); background: #fff; padding: 28px 30px; max-width: 640px; margin: 0 auto 32px; box-shadow: var(--shadow-lg); }
    .strength-title { font-family: 'Bagel Fat One', cursive; font-size: 21px; margin-bottom: 20px; }
    .strength-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .strength-row:last-child { margin-bottom: 0; }
    .strength-label { font: 700 12px/1 'Space Mono', monospace; letter-spacing: .06em; text-transform: uppercase; width: 130px; flex-shrink: 0; color: var(--text-muted); }
    .strength-bar-wrap { flex: 1; height: 10px; background: #F0E8D8; border-radius: var(--radius-pill); overflow: hidden; border: var(--border-light); }
    .strength-bar { height: 100%; border-radius: var(--radius-pill); transition: width .6s ease; }
    .strength-val { font: 700 12px/1 'Space Mono', monospace; width: 28px; text-align: right; }

    .alt-box { border: var(--border); border-radius: var(--radius-lg); background: #fff; padding: 28px 30px; max-width: 640px; margin: 0 auto 40px; text-align: left; box-shadow: var(--shadow-lg); }
    .alt-box-title { font-family: 'Bagel Fat One', cursive; font-size: 21px; margin-bottom: 16px; }
    .alt-row { display: flex; gap: 14px; align-items: flex-start; padding: 13px 0; border-bottom: var(--border-light); }
    .alt-row:last-child { border-bottom: none; }
    .alt-dot { flex: none; width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--ink); margin-top: 4px; }
    .alt-name { font-weight: 700; font-size: 15px; margin-bottom: 4px; }
    .alt-reason { font-size: 14px; line-height: 1.5; color: var(--text-muted); }

    .result-actions { text-align: center; margin-bottom: 40px; }
    .btn-cta { display: inline-flex; align-items: center; gap: 10px; background: var(--orange); color: var(--ink); border: var(--border); border-radius: var(--radius-pill); padding: 18px 38px; font-weight: 700; font-size: 18px; box-shadow: var(--shadow-md); text-decoration: none; margin-bottom: 24px; transition: transform .12s, box-shadow .12s; }
    .btn-cta:hover { transform: translate(-1px,-1px); box-shadow: 6px 6px 0 var(--ink); color: var(--ink); }
    .btn-restart { font: 700 12px/1 'Space Mono', monospace; letter-spacing: .08em; text-transform: uppercase; color: var(--text-muted); border-bottom: 2px solid var(--ink); padding-bottom: 3px; cursor: pointer; }

    @media (max-width: 640px) {
      .wrap { padding: 32px 16px; }
      .grid.cols-5 { grid-template-columns: repeat(2, 1fr); }
      .grid.cols-3 { grid-template-columns: repeat(2, 1fr); }
      .grid.cols-2 { grid-template-columns: 1fr; max-width: 100%; }
      .step-title { font-size: 28px; }
      .result-hero { padding: 32px 20px; border-radius: var(--radius-md); }
      .result-name { font-size: 52px; }
      .result-tagline { font-size: 18px; }
      .strength-label { width: 80px; font-size: 10px; }
      .strength-box, .alt-box { padding: 20px 16px; }
      .btn-back { padding: 12px 20px; font-size: 14px; }
      .btn-next { padding: 12px 24px; font-size: 14px; }
      .btn-cta { padding: 14px 24px; font-size: 16px; }
      .step-nav { margin-top: 32px; }
    }
  </style>
</head>
<body>

<div id="hub-header"></div>
<div class="wrap"><div id="app"></div></div>
<div id="hub-footer" style="max-width:820px;margin:0 auto;padding:0 24px;"></div>

<script src="/assets/data.fr.js"></script>
<script src="/assets/data.en.js"></script>
<script src="/assets/components.js"></script>
<script src="/assets/data.js"></script>
<script>
/* ======================================================
   SÉLECTEUR — Logique UI uniquement
   Les données sont dans data.js
====================================================== */

renderHeader('selecteur');
renderFooter();

const STEP_META = {
  1: { eyebrow:"Étape 1/5", color:'#F89B6C', title:"C'est quoi comme objet ?",          subtitle:"Choisis ce qui décrit le mieux ce que tu veux imprimer." },
  2: { eyebrow:"Étape 2/5", color:'#F8556B', title:"Où sera-t-il utilisé ?",             subtitle:"L'environnement, c'est souvent ce qui décide tout." },
  3: { eyebrow:"Étape 3/5", color:'#5B22D6', title:"Quelles contraintes physiques ?",    subtitle:"Sélectionne tout ce qui s'applique à ton objet. (0 à 3 choix)" },
  4: { eyebrow:"Étape 4/5", color:'#F2641E', title:"Quel rendu tu veux ?",               subtitle:"La finition souhaitée peut affiner le choix du filament." },
  5: { eyebrow:"Étape 5/5", color:'#F89B6C', title:"T'en es où avec l'impression 3D ?", subtitle:"Ça nous aide à ne pas te proposer quelque chose de trop technique." }
};
const PROGRESS_COLORS = ['#F89B6C', '#F8556B', '#5B22D6', '#F2641E', '#F89B6C'];

/* --- État --- */
let state = { step:1, type:null, env:null, constraints:[], finition:null, level:null };
let isNavigating = false;

function resetState() {
  state = { step:1, type:null, env:null, constraints:[], finition:null, level:null };
}

function canProceed() {
  const { step, type, env, finition, level } = state;
  if (step === 1) return !!type;
  if (step === 2) return !!env;
  if (step === 3) return true; // optionnel
  if (step === 4) return !!finition;
  if (step === 5) return !!level;
  return true;
}

/* --- Actions --- */
function sel(key, val)        { state[key] = val; render(); }
function toggleConstraint(id) {
  const i = state.constraints.indexOf(id);
  if (i > -1) state.constraints.splice(i, 1);
  else if (state.constraints.length < 3) state.constraints.push(id);
  render();
}
function skipConstraints() {
  state.constraints = [];
  navigate(4);
}

function navigate(newStep) {
  const wrapper = document.querySelector('#app > div');
  if (!wrapper) { state.step = newStep; render(); return; }
  wrapper.classList.add('step-zoom-out');
  setTimeout(() => {
    state.step = newStep;
    isNavigating = true;
    render();
    isNavigating = false;
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, 180);
}

function next()    { if (canProceed()) navigate(Math.min(6, state.step + 1)); }
function back()    { navigate(Math.max(1, state.step - 1)); }
function restart() { resetState(); isNavigating = true; render(); isNavigating = false; }

/* --- Helpers HTML --- */
function cardHtml(o, selected, onclick, disabled = false) {
  return `<div class="card ${selected ? 'selected' : ''} ${disabled ? 'disabled' : ''}"
    ${onclick && !disabled ? `onclick="${onclick}"` : ''}>
    ${selected ? '<div class="badge">✓</div>' : ''}
    <div class="icon">${o.icon}</div>
    <div class="label">${o.label}</div>
    ${o.hint ? `<div class="hint">${o.hint}</div>` : ''}
  </div>`;
}

function largeCardHtml(o, selected, onclick) {
  return `<div class="card large ${selected ? 'selected' : ''}" onclick="${onclick}">
    ${selected ? '<div class="badge">✓</div>' : ''}
    <div class="label">${o.label}</div>
    <div class="hint">${o.hint}</div>
  </div>`;
}

function strengthBarsHtml(scores, color) {
  return Object.entries(scores).map(([k, v]) => `
    <div class="strength-row">
      <div class="strength-label">${SCORE_LABELS[k]}</div>
      <div class="strength-bar-wrap"><div class="strength-bar" style="width:${v/5*100}%;background:${color};"></div></div>
      <div class="strength-val">${v}/5</div>
    </div>`).join('');
}

function recapHtml() {
  const { type, env, constraints, finition, level } = state;
  const tags = [
    Q_TYPE.find(d => d.id === type)?.label,
    Q_ENV.find(d => d.id === env)?.label,
    ...constraints.map(c => Q_CONSTRAINTS.find(d => d.id === c)?.label),
    Q_FINISH.find(d => d.id === finition)?.label,
    Q_LEVEL.find(d => d.id === level)?.label,
  ].filter(Boolean);
  return tags.map(t => `<span class="recap-tag">${t}</span>`).join('');
}

/* --- Rendu --- */
function render() {
  const app = document.getElementById('app');
  const { step, type, env, constraints, finition, level } = state;
  const anim = isNavigating ? 'step-zoom-in' : '';

  /* RÉSULTAT */
  if (step === 6) {
    const key    = decideFilament(type, env, constraints, finition, level);
    const f      = FILAMENTS[key];
    const barCol = key === 'ASA' ? '#F2641E' : f.color;
    const others = ALL_FILAMENTS.filter(k => k !== key);

    app.innerHTML = `<div class="${anim}">
      <div class="recap">${recapHtml()}</div>
      <div class="result-hero" style="border:2.5px solid ${f.color};box-shadow:8px 8px 0 ${f.color};">
        <div class="result-eyebrow">${LANG === 'en' ? 'Your ideal filament' : 'Ton filament idéal'}</div>
        <div class="result-name" style="color:${f.color};">${key}</div>
        <div class="result-tagline">${LANG === 'en' ? 'This is the filament you need.' : 'C\'est le filament qu\'il te faut.'}</div>
        <div class="result-desc">${f.core}</div>
      </div>
      <div class="strength-box">
        <div class="strength-title">${LANG === 'en' ? 'Its strengths' : 'Ses points forts'}</div>
        ${strengthBarsHtml(f.scores, barCol)}
      </div>
      <div class="alt-box">
        <div class="alt-box-title">${LANG === 'en' ? 'Why not the others?' : 'Pourquoi pas les autres ?'}</div>
        ${others.map(k => {
          const o = FILAMENTS[k];
          return `<div class="alt-row">
            <span class="alt-dot" style="background:${o.color};"></span>
            <div><div class="alt-name">${k}</div><div class="alt-reason">${o.whyNot}</div></div>
          </div>`;
        }).join('')}
      </div>
      <div class="result-actions">
        <a class="btn-cta" href="${f.affiliateLink || '#'}"
          target="${f.affiliateLink ? '_blank' : '_self'}" rel="noopener"
          ${f.affiliateLink ? '' : 'onclick="return false;"'}>
          ${LANG === 'en' ? 'See the recommended filament →' : 'Voir le filament recommandé →'}
        </a>
        <div><span class="btn-restart" onclick="restart()">↺ ${LANG === 'en' ? 'Retake the test' : 'Refaire le test'}</span></div>
      </div>
    </div>`;
    return;
  }

  /* ÉTAPES */
  const meta  = STEP_META[step];
  const ok    = canProceed();
  const pbar  = PROGRESS_COLORS.map((c, i) =>
    `<div style="background:${step >= i+1 ? c : 'var(--bg)'};"></div>`).join('');

  let content = '';
  if (step === 1) {
    content = `<div class="grid cols-5">${Q_TYPE.map(o => cardHtml(o, type === o.id, `sel('type','${o.id}')`)).join('')}</div>`;
  } else if (step === 2) {
    content = `<div class="grid cols-3">${Q_ENV.map(o => cardHtml(o, env === o.id, `sel('env','${o.id}')`)).join('')}</div>`;
  } else if (step === 3) {
    const atMax = constraints.length >= 3;
    const hasConstraints = constraints.length > 0;
    content = `
      <div class="constraint-helper">${hasConstraints
        ? (LANG === 'en' ? `${constraints.length}/3 selected` : `${constraints.length}/3 sélectionnée${constraints.length > 1 ? 's' : ''}`)
        : (LANG === 'en' ? 'Select up to 3 constraints, or skip.' : 'Sélectionne jusqu\'à 3 contraintes, ou passe directement.')
      }</div>
      <div class="grid cols-2">${Q_CONSTRAINTS.map(o => {
        const sel = constraints.includes(o.id);
        return cardHtml(o, sel, `toggleConstraint('${o.id}')`, !sel && atMax);
      }).join('')}</div>
      <div class="btn-none-wrap">
        <button class="btn-none ${!hasConstraints ? 'active' : ''}" onclick="skipConstraints()">
          <span class="btn-none-icon">○</span>
          ${LANG === 'en' ? 'No physical constraints — skip to next step' : 'Aucune contrainte physique — passer à l\'étape suivante'}
        </button>
      </div>`;
  } else if (step === 4) {
    content = `<div class="grid cols-2">${Q_FINISH.map(o => cardHtml(o, finition === o.id, `sel('finition','${o.id}')`)).join('')}</div>`;
  } else if (step === 5) {
    content = `<div class="grid cols-3">${Q_LEVEL.map(o => largeCardHtml(o, level === o.id, `sel('level','${o.id}')`)).join('')}</div>`;
  }

  app.innerHTML = `<div class="${anim}">
    <div class="step-head">
      <div class="step-eyebrow" style="color:${meta.color};">${meta.eyebrow}</div>
      <div class="step-title">${meta.title}</div>
      <div class="step-subtitle">${meta.subtitle}</div>
    </div>
    <div class="progress">${pbar}</div>
    ${content}
    <div class="step-nav">
      <div class="btn-back ${step === 1 ? 'hidden' : ''}" onclick="back()">← ${LANG === 'en' ? 'Back' : 'Retour'}</div>
      <div class="btn-next ${ok ? 'ok' : ''}" onclick="next()">
        ${step === 5 ? (LANG === 'en' ? 'See my result →' : 'Voir mon résultat →') : (LANG === 'en' ? 'Next →' : 'Suivant →')}
      </div>
    </div>
  </div>`;
}

render();
</script>
</body>
</html>
