<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NervyFox — Sélecteur de filament</title>
<meta name="description" content="Trouve le bon filament 3D pour ton projet en 5 étapes. Guide gratuit par NervyFox.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F8F0E3;
    --orange:#F2641E;
    --violet:#5B22D6;
    --rose:#F8556B;
    --orange-doux:#F89B6C;
    --ink:#1A1510;
    --selected-bg:#FBE6D8;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    min-height:100vh;
    background-color:var(--bg);
    background-image:radial-gradient(rgba(26,21,16,.10) 1.4px,transparent 1.4px);
    background-size:24px 24px;
    font-family:'Space Grotesk',sans-serif;
    color:var(--ink);
  }
  a{color:var(--orange)}
  a:hover{color:var(--ink)}
  .wrap{max-width:820px;margin:0 auto;padding:56px 24px 40px;}

  /* HEADER */
  .ticker-wrap{background:var(--ink);padding:7px 0;white-space:nowrap;overflow:hidden;}
  .ticker{display:inline-block;font:700 11px/1 'Space Mono',monospace;letter-spacing:.12em;color:#9A8C76;}
  .orange-bar{background:var(--orange);height:3px;}
  .masthead{display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap;padding:18px 32px;background:var(--bg);}
  .masthead img{height:38px;width:auto;display:block;}
  .masthead nav{display:flex;align-items:center;gap:28px;}
  .masthead nav a{font-size:13px;font-weight:600;color:#9A8C76;letter-spacing:.04em;text-decoration:none;cursor:pointer;}
  .masthead nav a.active{font-weight:700;color:var(--ink);border-bottom:2.5px solid var(--orange);padding-bottom:3px;}
  .masthead nav a:hover{color:var(--ink);}
  .masthead .cta-site{background:var(--ink);color:var(--bg);font-size:12px;font-weight:700;padding:8px 16px;border-radius:999px;letter-spacing:.06em;text-decoration:none;}
  .masthead .cta-site:hover{background:#333;}

  /* ÉTAPES */
  .step-head{text-align:center;margin-bottom:36px;}
  .eyebrow{font:700 12px/1 'Space Mono',monospace;letter-spacing:.18em;text-transform:uppercase;margin-bottom:14px;}
  .title{font-family:'Bagel Fat One',cursive;font-size:40px;line-height:1.08;margin-bottom:14px;}
  .subtitle{font-size:16px;color:#5C5343;max-width:520px;margin:0 auto;}

  .progress{display:flex;max-width:480px;margin:0 auto 44px;height:14px;border:2.5px solid var(--ink);border-radius:999px;overflow:hidden;background:var(--bg);}
  .progress div{flex:1;border-right:2px solid var(--ink);}
  .progress div:last-child{border-right:none;}

  /* ANIMATION — zoom out/in sur navigation uniquement */
  @keyframes zoomIn {
    from { opacity:0; transform:scale(.94); }
    to   { opacity:1; transform:scale(1); }
  }
  @keyframes zoomOut {
    from { opacity:1; transform:scale(1); }
    to   { opacity:0; transform:scale(.94); }
  }
  .step-zoom-in  { animation: zoomIn  .22s ease forwards; }
  .step-zoom-out { animation: zoomOut .18s ease forwards; }

  /* CARDS */
  .grid{display:grid;gap:16px;}
  .grid.cols-5{grid-template-columns:repeat(5,1fr);}
  .grid.cols-3{grid-template-columns:repeat(3,1fr);}
  .grid.cols-2{grid-template-columns:repeat(2,1fr);max-width:600px;margin:0 auto;}
  .card{position:relative;border:2.5px solid var(--ink);border-radius:16px;background:#fff;padding:24px 14px;display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center;cursor:pointer;transition:transform .12s ease;}
  .card:hover{transform:translateY(-2px);}
  .card.selected{background:var(--selected-bg);box-shadow:5px 5px 0 var(--ink);}
  .card.disabled{opacity:.4;cursor:not-allowed;}
  .card.disabled:hover{transform:none;}
  .card .icon{font-size:26px;line-height:1;}
  .card .label{font-weight:700;font-size:14px;line-height:1.3;}
  .card .hint{font-size:12px;color:#8A7C64;line-height:1.4;margin-top:2px;}
  .card .badge{position:absolute;top:-10px;right:-10px;width:26px;height:26px;border-radius:50%;background:var(--orange);border:2.5px solid var(--ink);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:var(--ink);}
  .card.large{padding:28px 18px;border-radius:18px;gap:10px;}
  .card.large .label{font-size:16px;}
  .constraint-helper{text-align:center;margin-bottom:18px;font:700 12px/1 'Space Mono',monospace;letter-spacing:.1em;text-transform:uppercase;color:#5C5343;}

  /* NAV */
  .nav{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-top:48px;}
  .btn-back{display:inline-flex;align-items:center;gap:8px;border:2.5px solid var(--ink);border-radius:999px;padding:14px 26px;font-weight:700;font-size:15px;cursor:pointer;background:#fff;font-family:inherit;}
  .btn-back:hover{background:var(--bg);}
  .btn-back.hidden{visibility:hidden;}
  .btn-next{display:inline-flex;align-items:center;gap:9px;border:2.5px solid var(--ink);border-radius:999px;padding:15px 32px;font-weight:700;font-size:16px;cursor:pointer;font-family:inherit;background:#EFE6D6;color:#B7AA92;box-shadow:none;}
  .btn-next.ok{background:var(--orange);color:var(--ink);box-shadow:4px 4px 0 var(--ink);}

  /* RÉSULTAT — hero banner */
  .result-hero{
    background:var(--ink);color:var(--bg);
    border-radius:24px;padding:48px 40px;
    text-align:center;margin-bottom:32px;
    border:2.5px solid var(--ink);
  }
  .result-hero-eyebrow{font:700 11px/1 'Space Mono',monospace;letter-spacing:.2em;text-transform:uppercase;color:#9A8C76;margin-bottom:20px;}
  .result-hero-name{font-family:'Bagel Fat One',cursive;font-size:72px;line-height:1;margin-bottom:8px;}
  .result-hero-tagline{font-family:'Bagel Fat One',cursive;font-size:24px;opacity:.7;margin-bottom:28px;}
  .result-hero-desc{font-size:16px;line-height:1.65;max-width:560px;margin:0 auto;color:#C4B89A;}

  /* RÉCAPITULATIF */
  .recap{
    display:flex;flex-wrap:wrap;gap:8px;justify-content:center;
    margin-bottom:32px;
  }
  .recap-tag{
    background:#fff;border:2px solid var(--ink);border-radius:999px;
    padding:6px 14px;font:700 11px/1 'Space Mono',monospace;
    letter-spacing:.06em;text-transform:uppercase;color:var(--ink);
  }

  /* BARRES DE FORCE */
  .strength-box{border:2.5px solid var(--ink);border-radius:20px;background:#fff;padding:28px 30px;max-width:640px;margin:0 auto 32px;box-shadow:6px 6px 0 rgba(26,21,16,.12);}
  .strength-title{font-family:'Bagel Fat One',cursive;font-size:21px;margin-bottom:20px;}
  .strength-row{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
  .strength-row:last-child{margin-bottom:0;}
  .strength-label{font:700 12px/1 'Space Mono',monospace;letter-spacing:.06em;text-transform:uppercase;width:130px;flex-shrink:0;color:#5C5343;}
  .strength-bar-wrap{flex:1;height:10px;background:#F0E8D8;border-radius:999px;overflow:hidden;border:1.5px solid rgba(26,21,16,.12);}
  .strength-bar{height:100%;border-radius:999px;transition:width .6s ease;}
  .strength-val{font:700 12px/1 'Space Mono',monospace;width:28px;text-align:right;color:var(--ink);}

  /* ALT BOX */
  .alt-box{border:2.5px solid var(--ink);border-radius:20px;background:#fff;padding:28px 30px;max-width:640px;margin:0 auto 40px;text-align:left;box-shadow:6px 6px 0 rgba(26,21,16,.12);}
  .alt-box-title{font-family:'Bagel Fat One',cursive;font-size:21px;margin-bottom:16px;}
  .alt-row{display:flex;gap:14px;align-items:flex-start;padding:13px 0;border-bottom:1.5px solid rgba(26,21,16,.12);}
  .alt-row:last-child{border-bottom:none;}
  .alt-dot{flex:none;width:14px;height:14px;border-radius:50%;border:2px solid var(--ink);margin-top:4px;}
  .alt-name{font-weight:700;font-size:15px;margin-bottom:4px;}
  .alt-reason{font-size:14px;line-height:1.5;color:#5C5343;}

  .result-actions{text-align:center;margin-bottom:40px;}
  .cta{display:inline-flex;align-items:center;gap:10px;background:var(--orange);color:var(--ink);border:2.5px solid var(--ink);border-radius:999px;padding:18px 38px;font-weight:700;font-size:18px;box-shadow:5px 5px 0 var(--ink);cursor:pointer;margin-bottom:24px;text-decoration:none;transition:transform .12s ease, box-shadow .12s ease;}
  .cta:hover{transform:translate(-1px,-1px);box-shadow:6px 6px 0 var(--ink);}
  .restart{font:700 12px/1 'Space Mono',monospace;letter-spacing:.08em;text-transform:uppercase;color:#5C5343;border-bottom:2px solid var(--ink);padding-bottom:3px;cursor:pointer;}

  /* FOOTER */
  .footer{text-align:center;margin-top:64px;padding-top:24px;border-top:2px solid rgba(26,21,16,.12);}
  .footer img{height:22px;width:auto;margin-bottom:10px;display:inline-block;}
  .footer .tag{font:700 10px/1.5 'Space Mono',monospace;letter-spacing:.12em;text-transform:uppercase;color:#9A8C76;}
  .footer .version{font:400 10px/1.5 'Space Mono',monospace;letter-spacing:.08em;color:#C4B89A;margin-top:4px;}

  @media(max-width:640px){
    .grid.cols-5{grid-template-columns:repeat(2,1fr);}
    .grid.cols-3{grid-template-columns:repeat(2,1fr);}
    .grid.cols-2{grid-template-columns:1fr;}
    .title{font-size:30px;}
    .result-hero-name{font-size:52px;}
    .strength-label{width:90px;font-size:10px;}
  }
</style>
</head>
<body>

<div class="ticker-wrap">
  <span class="ticker" id="ticker">
    &nbsp;&nbsp;&nbsp;✦ OUTILS GRATUITS POUR MAKERS &nbsp;&nbsp;&nbsp;—&nbsp;&nbsp;&nbsp; DESIGNED WITH A 70S BRAIN &nbsp;&nbsp;&nbsp;—&nbsp;&nbsp;&nbsp; IMPRESSION 3D ACCESSIBLE À TOUS &nbsp;&nbsp;&nbsp;✦ OUTILS GRATUITS POUR MAKERS &nbsp;&nbsp;&nbsp;—&nbsp;&nbsp;&nbsp; DESIGNED WITH A 70S BRAIN &nbsp;&nbsp;&nbsp;—&nbsp;&nbsp;&nbsp; IMPRESSION 3D ACCESSIBLE À TOUS &nbsp;&nbsp;&nbsp;
  </span>
</div>
<div class="orange-bar"></div>
<div class="masthead">
  <img src="assets/logo-wordmark.png" alt="NervyFox">
  <nav>
    <a href="#" class="active">Sélecteur filament</a>
    <a href="#">Couleurs</a>
    <a href="#">Guides</a>
    <a href="#">Ressources</a>
  </nav>
  <a href="https://nervyfox.fr" target="_blank" class="cta-site">nervyfox.fr →</a>
</div>

<div class="wrap">
  <div id="app"></div>
</div>

<script>
/* ======================================================
   DONNÉES
====================================================== */

const VERSION = 'V0.2.1';

const stepMeta = {
  1: { eyebrow:"Étape 1/5", color:'#F89B6C', title:"C'est quoi comme objet ?",          subtitle:"Choisis ce qui décrit le mieux ce que tu veux imprimer." },
  2: { eyebrow:"Étape 2/5", color:'#F8556B', title:"Où sera-t-il utilisé ?",             subtitle:"L'environnement, c'est souvent ce qui décide tout." },
  3: { eyebrow:"Étape 3/5", color:'#5B22D6', title:"Quelles contraintes physiques ?",    subtitle:"Sélectionne tout ce qui s'applique à ton objet. (0 à 3 choix)" },
  4: { eyebrow:"Étape 4/5", color:'#F2641E', title:"Quel rendu tu veux ?",               subtitle:"La finition souhaitée peut affiner le choix du filament." },
  5: { eyebrow:"Étape 5/5", color:'#F89B6C', title:"T'en es où avec l'impression 3D ?", subtitle:"Ça nous aide à ne pas te proposer quelque chose de trop technique." }
};

const typeDefs = [
  { id:'deco',  label:"Objet décoratif",         icon:'✦', hint:"Figurine, vase, déco murale..." },
  { id:'proto', label:"Prototype / maquette",     icon:'◐', hint:"Test visuel, modèle de présentation" },
  { id:'func',  label:"Pièce fonctionnelle",      icon:'⌂', hint:"Support, boîtier, fixation, clip..." },
  { id:'flex',  label:"Pièce souple ou flexible", icon:'∿', hint:"Joint, grip, amortisseur, semelle..." },
  { id:'tech',  label:"Pièce technique",          icon:'⚙', hint:"Mécanique, haute résistance, engrenage..." },
];

const envDefs = [
  { id:'int',  label:"Intérieur uniquement", icon:'⌂', hint:"Bureau, salon, atelier..." },
  { id:'ext',  label:"Extérieur",            icon:'☀', hint:"Pluie, soleil, variations de temp." },
  { id:'both', label:"Les deux",             icon:'⟳', hint:"Parfois dehors, parfois dedans" },
];

const constraintDefs = [
  { id:'heat',  label:"Exposé à la chaleur",        icon:'♨', hint:">50°C — voiture, cuisine, lampe..." },
  { id:'water', label:"Contact avec l'eau",          icon:'≈', hint:"Humidité prolongée ou immersion" },
  { id:'shock', label:"Chocs ou poids à supporter", icon:'⚡', hint:"Résistance mécanique importante" },
  { id:'uv',    label:"Soleil direct / UV",          icon:'☀', hint:"Exposition prolongée au soleil" },
];

const finitionDefs = [
  { id:'none',        label:"Peu importe",              icon:'—', hint:"C'est purement fonctionnel" },
  { id:'smooth',      label:"Surface lisse et propre",  icon:'◎', hint:"Visible, esthétique" },
  { id:'detail',      label:"Détails fins et précis",   icon:'⬡', hint:"Petits éléments, textes, relief" },
  { id:'transparent', label:"Transparent ou translucide", icon:'◐', hint:"Laisser passer la lumière" },
];

const levelDefs = [
  { id:'total', label:"Débutant complet",                 hint:"Je n'ai jamais lancé une impression." },
  { id:'some',  label:"Quelques impressions déjà faites", hint:"Je connais les bases, sans plus." },
  { id:'exp',   label:"Expérimenté",                      hint:"Je règle ma machine moi-même." },
];

const filamentData = {
  PLA:  {
    color:'#F2641E', text:'#1A1510', affiliateLink:'',
    scores:{ facilite:5, resistance:2, chaleur:1, eau:2, finition:5, cout:5 },
    core:"Le PLA est le filament idéal pour commencer : facile à imprimer, belle finition, pas de warping. Parfait pour tout ce qui ne subit pas de chaleur ni d'humidité.",
    whyNot:"Très simple à utiliser et joli à imprimer, mais il ramollit dès 60°C, n'aime pas l'humidité prolongée, et se dégrade aux UV. À éviter à l'extérieur."
  },
  PETG: {
    color:'#5B22D6', text:'#F8F0E3', affiliateLink:'',
    scores:{ facilite:4, resistance:4, chaleur:3, eau:4, finition:4, cout:4 },
    core:"Le PETG est le filament polyvalent par excellence : presque aussi simple à imprimer que le PLA, mais bien plus résistant à l'humidité, aux chocs et aux températures modérées (jusqu'à ~80°C).",
    whyNot:"Très bon compromis solidité/facilité, mais se dégrade sous les UV intenses sur le long terme et ne tient pas aux très hautes températures (>80°C)."
  },
  ABS:  {
    color:'#F8556B', text:'#1A1510', affiliateLink:'',
    scores:{ facilite:2, resistance:4, chaleur:4, eau:3, finition:3, cout:4 },
    core:"L'ABS résiste bien à la chaleur (jusqu'à ~100°C) et aux chocs mécaniques. Un vrai filament technique, mais qui demande une imprimante fermée et un peu d'expérience.",
    whyNot:"Costaud et résistant à la chaleur, mais il se déforme souvent en imprimant (warping), dégage des vapeurs, et demande une imprimante fermée. Déconseillé aux débutants."
  },
  ASA:  {
    color:'#1A1510', text:'#F8F0E3', affiliateLink:'',
    scores:{ facilite:2, resistance:4, chaleur:4, eau:4, finition:3, cout:3 },
    core:"L'ASA combine les qualités de l'ABS avec une excellente résistance aux UV et aux intempéries. C'est LE choix pour l'extérieur exposé au soleil ou à la chaleur intense.",
    whyNot:"Champion de l'extérieur et des UV, mais plus cher, plus technique à imprimer que le PETG, et inutile pour un simple usage intérieur."
  },
  TPU:  {
    color:'#F89B6C', text:'#1A1510', affiliateLink:'',
    scores:{ facilite:2, resistance:3, chaleur:2, eau:3, finition:3, cout:3 },
    core:"Le TPU est le filament souple par excellence : il plie, s'étire, et revient à sa forme sans casser. Indispensable pour tout ce qui doit absorber les chocs ou rester flexible.",
    whyNot:"Parfait pour la souplesse, mais totalement inadapté si ta pièce doit rester rigide. Peut aussi être capricieux à imprimer (impression lente conseillée)."
  }
};

const allFilaments = ['PLA','PETG','ABS','ASA','TPU'];

/* ======================================================
   ARBRE DE DÉCISION
====================================================== */

function decide(type, env, constraints, finition, level) {
  const heat    = constraints.includes('heat');
  const water   = constraints.includes('water');
  const shock   = constraints.includes('shock');
  const flex    = constraints.includes('flex') || type === 'flex';
  const uv      = constraints.includes('uv');
  const outdoor = env === 'ext' || env === 'both';
  const expert  = level === 'exp';

  if (flex) return 'TPU';
  if (heat) {
    if (outdoor || uv) return 'ASA';
    if (expert) return 'ABS';
    return 'PETG';
  }
  if (outdoor) {
    if (uv) return 'ASA';
    return 'PETG';
  }
  if (water) return 'PETG';
  if (type === 'deco' || type === 'proto') return 'PLA';
  if (type === 'tech') {
    if (expert) return 'ABS';
    return 'PETG';
  }
  if (shock) return 'PETG';
  if (finition === 'transparent') return 'PETG';
  return 'PLA';
}

/* ======================================================
   RÉCAP CHOIX
====================================================== */

function buildRecapTags(type, env, constraints, finition, level) {
  const typeLabel   = typeDefs.find(d=>d.id===type)?.label || '';
  const envLabel    = envDefs.find(d=>d.id===env)?.label || '';
  const cLabels     = constraints.map(c => constraintDefs.find(d=>d.id===c)?.label || '');
  const finLabel    = finitionDefs.find(d=>d.id===finition)?.label || '';
  const levelLabel  = levelDefs.find(d=>d.id===level)?.label || '';
  const tags = [typeLabel, envLabel, ...cLabels, finLabel, levelLabel].filter(Boolean);
  return tags.map(t => `<span class="recap-tag">${t}</span>`).join('');
}

/* ======================================================
   ÉTAT
====================================================== */

let state = { step:1, type:null, env:null, constraints:[], finition:null, level:null };
let isNavigating = false;

function canProceed() {
  const { step, type, env, constraints, finition, level } = state;
  if (step===1) return !!type;
  if (step===2) return !!env;
  if (step===3) return true;
  if (step===4) return !!finition;
  if (step===5) return !!level;
  return true;
}

/* ======================================================
   ACTIONS
====================================================== */

function sel(key, val) { state[key] = val; render(); }
function toggleConstraint(id) {
  const has = state.constraints.includes(id);
  if (has) state.constraints = state.constraints.filter(c => c !== id);
  else if (state.constraints.length < 3) state.constraints = [...state.constraints, id];
  render();
}
function navigate(newStep) {
  const app = document.getElementById('app');
  const wrapper = app.firstElementChild;
  if (!wrapper) { state.step = newStep; render(); return; }
  // Zoom out sur le contenu actuel
  wrapper.classList.add('step-zoom-out');
  setTimeout(function(){
    state.step = newStep;
    isNavigating = true;
    render();
    isNavigating = false;
    window.scrollTo({top:0,behavior:'smooth'});
  }, 180);
}
function next() {
  if (!canProceed()) return;
  navigate(Math.min(6, state.step + 1));
}
function back() {
  navigate(Math.max(1, state.step - 1));
}
function restart() {
  state = { step:1, type:null, env:null, constraints:[], finition:null, level:null };
  isNavigating = true;
  render();
  isNavigating = false;
}

/* ======================================================
   RENDU
====================================================== */

function cardHtml(o, selected, onclick, disabled=false, showHint=false) {
  return `<div class="card ${selected?'selected':''} ${disabled?'disabled':''}" ${onclick&&!disabled?`onclick="${onclick}"`:''}">
    ${selected?'<div class="badge">✓</div>':''}
    <div class="icon">${o.icon}</div>
    <div class="label">${o.label}</div>
    ${showHint&&o.hint?`<div class="hint">${o.hint}</div>`:''}
  </div>`;
}

function largeCardHtml(o, selected, onclick) {
  return `<div class="card large ${selected?'selected':''}" onclick="${onclick}">
    ${selected?'<div class="badge">✓</div>':''}
    <div class="label">${o.label}</div>
    <div class="hint">${o.hint}</div>
  </div>`;
}

function strengthBarsHtml(scores, accentColor) {
  const labels = {
    facilite:  'Facilité',
    resistance:'Résistance',
    chaleur:   'Chaleur',
    eau:       'Eau / Humidité',
    finition:  'Finition',
    cout:      'Coût'
  };
  return Object.entries(scores).map(([k, v]) => {
    const pct = Math.round(v / 5 * 100);
    return `<div class="strength-row">
      <div class="strength-label">${labels[k]}</div>
      <div class="strength-bar-wrap">
        <div class="strength-bar" style="width:${pct}%;background:${accentColor};"></div>
      </div>
      <div class="strength-val">${v}/5</div>
    </div>`;
  }).join('');
}

function footerHtml() {
  return `<div class="footer">
    <img src="assets/logo-pill.png" alt="">
    <div class="tag">NervyFox · Hub Maker · Designed with a 70s brain</div>
    <div class="version">${VERSION}</div>
  </div>`;
}

function render() {
  const app = document.getElementById('app');
  const { step, type, env, constraints, finition, level } = state;
  const progressColors = ['#F89B6C','#F8556B','#5B22D6','#F2641E','#F89B6C'];

  /* ---- RÉSULTAT ---- */
  if (step === 6) {
    const result = decide(type, env, constraints, finition, level);
    const f = filamentData[result];
    const others = allFilaments.filter(x => x !== result);
    const barColor = result === 'ASA' ? '#F2641E' : f.color;

    app.innerHTML = `
      <div class="${isNavigating?'step-zoom-in':''}">

        <div class="recap">${buildRecapTags(type, env, constraints, finition, level)}</div>

        <div class="result-hero" style="border-color:${f.color};box-shadow:8px 8px 0 ${f.color};">
          <div class="result-hero-eyebrow">Ton filament idéal</div>
          <div class="result-hero-name" style="color:${f.color}">${result}</div>
          <div class="result-hero-tagline">C'est le filament qu'il te faut.</div>
          <div class="result-hero-desc">${f.core}</div>
        </div>

        <div class="strength-box">
          <div class="strength-title">Ses points forts</div>
          ${strengthBarsHtml(f.scores, barColor)}
        </div>

        <div class="alt-box">
          <div class="alt-box-title">Pourquoi pas les autres ?</div>
          ${others.map(id => {
            const o = filamentData[id];
            return `<div class="alt-row">
              <span class="alt-dot" style="background:${o.color}"></span>
              <div><div class="alt-name">${id}</div><div class="alt-reason">${o.whyNot}</div></div>
            </div>`;
          }).join('')}
        </div>

        <div class="result-actions">
          <a class="cta" href="${f.affiliateLink||'#'}" target="${f.affiliateLink?'_blank':'_self'}" rel="noopener" ${f.affiliateLink?'':'onclick="return false;"'}>Voir le filament recommandé →</a>
          <div><span class="restart" onclick="restart()">↺ Refaire le test</span></div>
        </div>

        ${footerHtml()}
      </div>
    `;
    return;
  }

  /* ---- ÉTAPES ---- */
  const meta = stepMeta[step];
  const ok = canProceed();
  const pbar = progressColors.map((c,i) => `<div style="background:${step>=i+1?c:'var(--bg)'}"></div>`).join('');

  let content = '';
  if (step === 1) {
    content = `<div class="grid cols-5">${typeDefs.map(o => cardHtml(o, type===o.id, `sel('type','${o.id}')`, false, true)).join('')}</div>`;
  } else if (step === 2) {
    content = `<div class="grid cols-3">${envDefs.map(o => cardHtml(o, env===o.id, `sel('env','${o.id}')`, false, true)).join('')}</div>`;
  } else if (step === 3) {
    const atMax = constraints.length >= 3;
    content = `
      <div class="constraint-helper">${constraints.length > 0 ? constraints.length+'/3 sélectionnées' : "Aucune contrainte ? Passe directement à l'étape suivante."}</div>
      <div class="grid cols-2">${constraintDefs.map(o => {
        const s = constraints.includes(o.id);
        const dis = !s && atMax;
        return cardHtml(o, s, `toggleConstraint('${o.id}')`, dis, true);
      }).join('')}</div>`;
  } else if (step === 4) {
    content = `<div class="grid cols-2">${finitionDefs.map(o => cardHtml(o, finition===o.id, `sel('finition','${o.id}')`, false, true)).join('')}</div>`;
  } else if (step === 5) {
    content = `<div class="grid cols-3">${levelDefs.map(o => largeCardHtml(o, level===o.id, `sel('level','${o.id}')`)).join('')}</div>`;
  }

  app.innerHTML = `
    <div class="${isNavigating?'step-zoom-in':''}">
      <div class="step-head">
        <div class="eyebrow" style="color:${meta.color}">${meta.eyebrow}</div>
        <div class="title">${meta.title}</div>
        <div class="subtitle">${meta.subtitle}</div>
      </div>
      <div class="progress">${pbar}</div>
      ${content}
      <div class="nav">
        <div class="btn-back ${step===1?'hidden':''}" onclick="back()">← Retour</div>
        <div class="btn-next ${ok?'ok':''}" onclick="next()">${step===5?'Voir mon résultat →':'Suivant →'}</div>
      </div>
      ${footerHtml()}
    </div>
  `;
}

render();

/* ======================================================
   TICKER
====================================================== */
(function(){
  const t = document.getElementById('ticker');
  const original = t.innerHTML;
  t.innerHTML = original + original;
  let pos = 0;
  const half = t.scrollWidth / 2;
  setInterval(function(){
    pos -= 0.5;
    if(Math.abs(pos) >= half) pos = 0;
    t.style.transform = 'translateX(' + pos + 'px)';
  }, 16);
})();
</script>
</body>
</html>
